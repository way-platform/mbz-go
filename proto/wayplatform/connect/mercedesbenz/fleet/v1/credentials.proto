edition = "2023";

package wayplatform.connect.mercedesbenz.fleet.v1;

// Credentials for Mercedes-Benz Fleet API (OAuth2 + Kafka).
//
// OAuth2 client credentials are used for both REST management API and Kafka SASL.
message Credentials {
  // OAuth2 client ID.
  string client_id = 1;
  // OAuth2 client secret.
  string client_secret = 2 [debug_redact = true];
  // Mercedes region determining Kafka bootstrap server (e.g. "ECE", "AMAP/NA").
  string region = 3;
  // Kafka consumer group.
  string kafka_consumer_group = 4;
  // Kafka input topic.
  string kafka_input_topic = 5;
}
