edition = "2023";

package wayplatform.connect.mbz.v1;

// Credentials for Mercedes-Benz REST API authentication.
//
// Supports two authentication modes:
//   - OAuth2: region + client_id + client_secret
//   - API key: api_key
message Credentials {
  // Region for OAuth2 authentication (e.g. "ECE", "AMAP/NA").
  string region = 1;
  // OAuth2 client ID.
  string client_id = 2;
  // OAuth2 client secret.
  string client_secret = 3 [debug_redact = true];
  // API key for vehicle specification endpoints.
  string api_key = 4 [debug_redact = true];
}
