openapi: 3.0.1
info:
  title: Remote Maintenance Support API
  description: The Remote Maintenance Support API will provide the possibility for
    3rd party applications (e.g. ADAC, ATU, etc.) to access vehicle maintenance data
    remotely on behalf of the Mercedes-Benz customer. To use the endpoints you need a valid
    vin/fin (vehicleId).
  contact:
    name: The open API platform by Mercedes-Benz
  version: "3.0.0"
servers:
- url: https://api.mercedes-benz.com/remotemaintenance/v3
security:
- OAuth2:
  - mb:vehicle:rms:reader
tags:
- name: Resource Readouts
  description: Remote Maintenance Support service for view all resources.
- name: Value Readouts
  description: Remote Maintenance Support service for view all resources.
- name: Vehicle Data Readout Refresh
  description: Remote Maintenance Support service to refresh the vehicle data readout
- name: Warning Indicator Readouts
  description: Remote Maintenance Support service to view warning indicators.
paths:
  /vehicles/{vehicleId}/resourceReadouts:
    post:
      tags:
      - Resource Readouts
      summary: View the List of resources
      description: 'This API creates a readout of available resources to the accessing
        party for one vehicle. If the result is available immediately, the result
        is returned. If the result isn''t available, a location to the resource readout
        is returned. This location shall be polled until the result is available.
        INFO: GET Requests are not yet supported!'
      operationId: getResourceReadoutsUsingPOST
      parameters:
      - name: vehicleId
        in: path
        description: vehicleId of the resources to be viewed
        required: true
        schema:
          type: string
      responses:
        201:
          description: Returns a resource to the accessing party
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDataContainer'
              examples:
                CAR:
                   $ref: '#/components/examples/ResourceReadoutCar'
                VAN:
                   $ref: '#/components/examples/ResourceReadoutVan'
                TRUCK:
                   $ref: '#/components/examples/ResourceReadoutTruck'
                BUS:
                   $ref: '#/components/examples/ResourceReadoutBus'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        
        501:
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        
        503:
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /vehicles/{vehicleId}/valueReadouts:
    post:
      tags:
      - Value Readouts
      summary: View the List of values
      description: This API creates a readout of available maintenance values for
        one vehicle. If the result is available immediately, the result is returned.
        If the result isn't available, a location to the resource readout is returned.
        This location shall be polled until the result is available.
      operationId: getValueReadouts
      parameters:
      - name: vehicleId
        in: path
        description: vehicleId of the values to be viewed
        required: true
        schema:
          type: string
      responses:
        201:
          description: Returns a value to the accessing party
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValueDataContainer'
              examples:
                CAR:
                   $ref: '#/components/examples/valueReadoutCar'
                VAN:
                   $ref: '#/components/examples/valueReadoutVan'
                TRUCK:
                   $ref: '#/components/examples/valueReadoutTruck'
                BUS:
                   $ref: '#/components/examples/valueReadoutBus'
        204:
          description: No snapshot data found in for this vehicle
          content: {}
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        402:
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'        
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        501:
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        503:
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                
  /vehicles/{vehicleId}/language/{language}/warningIndicatorReadouts:
    post:
      tags:
      - Warning Indicator Readouts
      description: 'Remote Maintenance Support service to read out warning indicators.
        INFO: GET Requests are not yet supported!'
      operationId: warningIndicatorReadouts
      parameters:
      - name: vehicleId
        in: path
        description: The vehicle identifier of the vehicle to read from.
        required: true
        schema:
          type: string
      - name: language
        in: path
        description: The Language the response will be given
        required: true
        schema:
          type: string
          enum:
          - ar
          - bg
          - cs
          - da
          - de
          - el
          - en
          - es
          - fi
          - fr
          - hr
          - hu
          - it
          - ja
          - ko
          - nl
          - pl
          - pt
          - ro
          - ru
          - sk
          - sl
          - sv
          - tr
          - zh
        example: en
      responses:
        201:
          description: Request to refresh the vehicle data readout was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/warningIndicatorReadoutDataContainer'
              examples:
                CAR:
                   $ref: '#/components/examples/WarningIndicatorReadoutCar'
                VAN:
                   $ref: '#/components/examples/WarningIndicatorReadoutVan'
                TRUCK:
                   $ref: '#/components/examples/WarningIndicatorReadoutTruck'
                BUS:
                   $ref: '#/components/examples/WarningIndicatorReadoutBus'
       
        204:
          description: No snapshot data found in for this vehicle
          content: {}
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        402:
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        501:
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        503:
          description: Service Unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
       
  /vehicles/{vehicleId}/vehicleDataReadoutRefresh:
    post:
      tags:
      - Vehicle Data Readout Refresh
      description: 'Remote Diagnostic Support service to refresh the vehicle data
        readout. This endpoint will send a trigger to the vehicle to refresh the vehicle
        data readout. It will not deliver the vehicle data readout. INFO: GET Requests
        are not yet supported!'
      operationId: vehicleDataReadoutRefresh
      parameters:
      - name: vehicleId
        in: path
        description: The vehicle identifier of the vehicle to read from.
        required: true
        schema:
          type: string
      responses:
        201:
          description: Request to refresh the vehicle data readout was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDataReadoutRefreshDataContainer'
              examples:
                CAR:
                   $ref: '#/components/examples/VdrrCar'
                VAN:
                   $ref: '#/components/examples/VdrrVan'
                TRUCK:
                   $ref: '#/components/examples/VdrrTruck'
                BUS:
                   $ref: '#/components/examples/VdrrBus'
       
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        402:
          description: Payment Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        501:
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        
        503:
          description: Service Unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        
components:
  
  schemas:
    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: string
          description: Error Code
        errorMessage:
          type: string
          description: Error Message
    CommonType:
      required:
      - asyncStatus
      - id
      - messageTimestamp
      - vehicleId
      type: object
      properties:
        id:
          type: string
          description: Id unique for this readout.
        asyncStatus:
          type: string
          description: Reflects the status of the readouts
          enum:
          - Pending
          - InProgress
          - Complete
          - Fail
        messageTimestamp:
          type: string
          description: Timestamp when this message was created.
          format: date-time
          example: 2018-01-01T00:00:00Z
        receivedTimestamp:
          type: string
          description: Timestamp when the data in the message was received by the
            ExVe backend from the vehicle.
          format: date-time
          example: 2018-01-01T00:00:20Z
        vehicleId:
          type: string
          description: The vehicle identifier of the extended vehicle, e.g VIN
    CommonTypeNoReceivedTimestamp:
      required:
      - asyncStatus
      - id
      - messageTimestamp
      - vehicleId
      type: object
      properties:
        id:
          type: string
          description: Id unique for this readout.
        asyncStatus:
          type: string
          description: Reflects the status of the readouts
          enum:
          - Pending
          - InProgress
          - Complete
          - Fail
        messageTimestamp:
          type: string
          description: Timestamp when this message was created.
          format: date-time
          example: 2018-01-01T00:00:00Z
        vehicleId:
          type: string
          description: The vehicle identifier of the extended vehicle, e.g VIN
    ResourceDataContainer:
      type: object
      properties:
        resourceReadout:
          $ref: '#/components/schemas/ResourceDataType'
    ResourceDataType:
      allOf:
      - $ref: '#/components/schemas/CommonType'
      - type: object
        properties:
          resources:
            type: array
            description: List of resources.
            items:
              $ref: '#/components/schemas/ResourceDataItem'
    ResourceDataItem:
      required:
      - api
      - name
      - version
      type: object
      properties:
        name:
          type: string
          description: Name of resource
        version:
          type: string
          description: Version of resource in API
        api:
          type: string
          description: URI to API exposing resource
    ValueDataContainer:
      type: object
      properties:
        valueReadout:
          $ref: '#/components/schemas/ValueDataType'
    ValueDataType:
      allOf:
      - $ref: '#/components/schemas/CommonType'
      - type: object
        properties:
          maintenanceData:
            type: array
            description: List of values.
            items:
              $ref: '#/components/schemas/ValueDataItem'
    ValueDataItem:
      type: object
      properties:
        odometervalue:
          type: string
          description: Odometer Value of the vehicle, only for PC and VAN
        servicecode:
          type: string
          description: Servicecode of the vehicle, only for PC
        workshopcode:
          type: string
          description: Version of resource in API
        distanceToService:
          type: string
          description: Distance to next service, only for PC and VAN
        timeToService:
          type: string
          description: Estimated time to next service, only for PC and VAN
        maintenanceData:
          $ref: '#/components/schemas/MaintenanceDataTable'
    warningIndicatorReadoutDataContainer:
      type: object
      properties:
        malfunctionIndicatorReadout:
          $ref: '#/components/schemas/warningIndicatorReadoutDataType'
    warningIndicatorReadoutDataType:
      allOf:
      - $ref: '#/components/schemas/CommonType'
      - type: object
        properties:
          warningIndicators:
            type: array
            description: Message of Vehicle Data Readout Refresh.
            items:
              $ref: '#/components/schemas/warningIndicatorReadoutDataItem'
    warningIndicatorReadoutDataItem:
      type: object
      properties:
        status:
          type: string
          description: Warning Indicator Readout Status
          example: STATUS_ACTIVE
          enum:
          - STATUS_NOT_ACTIVE
          - STATUS_ACTIVE
          - STATUS_ACTIVE_AND_BLINKING
          - STATUS_UNDEFINED
          - STATUS_UNKNOWN
        originalOdometerValue:
          type: string
          description: Warning Indicator Readout Original Odometer Value
          example: 624.0 km
        mostRecentOdometerValue:
          type: string
          description: Warning Indicator Readout most recent Odometer Value
          example: 624.0 km
        frequencyCounter:
          type: string
          description: How frequent this warning indicater has been recorded.
          example: "2"
        ignitionCycleCounter:
          type: string
          description: How often the ignition has been started since first ocurrence.
          example: "255"
        text:
          type: object
          properties:
            symptomText:
              type: string
              description: Text of Symptom
              example: Der Meldungsspeicher ist defekt.
            descriptionText:
              type: string
              description: Description text of symptom
              example: Aufgrund eines Defekts im Meldungsspeicher liegen keine Daten
                zu Display-Meldungen und Warn- und Kontrollleuchten vor.
          description: Contains Symptom and/or description text.
        icon:
          type: string
          description: Base64 encoded icon file
          example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAM0AAAD NCAMAAAAsYgRbAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5c
            cllPAAAABJQTFRF3NSmzMewPxIG//ncJEJsldTou1jHgAAAARBJREFUeNrs2EEK gCAQBVDLuv+v30dENbMY831wKz4Y/VHb/5RGQ0NDQ0NDQ0NDQ0NDQ0NDQ
            0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0PzMWtyaGhoaGhoaGhoaGhoaGhoxtb0QGho aGhoaGhoaGhoaGhoaMbRLEvv50VTQ9OTQ5OpyZ01GpM2g0bfmDQaL7S+ofFC6x
            v3ZpxJiywakzbvd9r3RWPS9I2+MWk0+kbf0Hih9Y17U0nTHibrDDQ0NDQ0NDQ0 NDQ0NDQ0NTXbRSL/AK72o6GhoaGhoRlL8951vwsNDQ0NDQ1NDc0WyHtDTEhD
            Q0NDQ0NTS5MdGhoaGhoaGhoaGhoaGhoaGhoaGhoaGposzSHAAErMwwQ2HwRQ AAAAAElFTkSuQmCC
    MaintenanceDataTable:
      type: array
      items:
        $ref: '#/components/schemas/maintenanceTable'
    maintenanceTable:
      type: object
      properties:
        type:
          type: string
          example: Faellige Wartugnsdaten
        name:
          type: string
          description: Encoded text expression. To be resolved using VDC localizer
            textmessage service.
          example: Due Maintenance Channels
        line:
          type: array
          items:
            $ref: '#/components/schemas/maintenanceLine'
    maintenanceLine:
      type: object
      properties:
        type:
          type: string
          example: Zeitwartung
        name:
          type: string
          description: Encoded text expression. To be resolved using VDC localizer
            textmessage service.
          example: time-based servicing
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: LDVL
              name:
                type: string
                example: left
              value:
                type: object
                properties:
                  textvalue:
                    type: string
                    example: Signal NICHT VORHANDEN
                  doublevalue:
                    type: string
                    example: 980.5
                  unit:
                    type: string
                    example: m
                  prefix:
                    type: string
                    example: k
    VehicleDataReadoutRefreshDataContainer:
      type: object
      properties:
        vehicleDataReadoutRefresh:
          $ref: '#/components/schemas/VehicleDataReadoutRefreshDataType'
    VehicleDataReadoutRefreshDataType:
      allOf:
      - $ref: '#/components/schemas/CommonTypeNoReceivedTimestamp'
      - type: object
        properties:
          message:
            type: array
            description: Message of Vehicle Data Readout Refresh.
            items:
              $ref: '#/components/schemas/VehicleDataReadoutRefreshDataItem'
    VehicleDataReadoutRefreshDataItem:
      required:
      - message
      type: object
      properties:
        message:
          type: string
          description: Specifies the exception message.
  examples:
